<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wi-Fi 監視ログビューア</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-zoom/2.0.1/chartjs-plugin-zoom.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans+JP:wght@400;500;600&display=swap');

  :root {
    --bg:      #0d1117;
    --surface: #161b22;
    --border:  #21262d;
    --accent:  #58a6ff;
    --green:   #3fb950;
    --red:     #f85149;
    --yellow:  #d29922;
    --text:    #c9d1d9;
    --muted:   #6e7681;
    --mono:    'IBM Plex Mono', monospace;
    --sans:    'IBM Plex Sans JP', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; overflow: hidden; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    height: 48px;
    flex-shrink: 0;
  }
  header h1 { font-size: 16px; font-weight: 600; letter-spacing: .04em; color: var(--accent); }

  /* ── Layout shell ── */
  .app-shell {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  .dashboard {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 16px;
    padding: 16px 24px;
    overflow-y: auto;
    min-height: 200px;
  }
  .dash-main { display: flex; flex-direction: column; gap: 16px; min-width: 0; }
  .dash-side { display: flex; flex-direction: column; gap: 12px; min-width: 0; }

  @media (max-width: 1100px) {
    .dashboard { grid-template-columns: 1fr; }
    .dash-side { order: -1; }
  }

  /* ── Docked Log Panel ── */
  .dock-panel {
    display: none;
    flex-direction: column;
    background: var(--surface);
    border-top: 1px solid var(--border);
    min-height: 0;
    height: 260px;
    flex-shrink: 0;
  }
  .dock-panel.open {
    display: flex;
  }
  .dock-divider {
    height: 6px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    cursor: ns-resize;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    user-select: none;
    transition: background .15s;
  }
  .dock-divider:hover, .dock-divider.dragging {
    background: var(--accent);
    opacity: .4;
  }
  .dock-divider-bar {
    width: 40px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
  }
  .dock-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .dock-header h2 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }
  .dock-toggle {
    margin-left: auto;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 26px;
    height: 26px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
  }
  .dock-toggle:hover { border-color: var(--accent); color: var(--text); }
  .dock-body {
    flex: 1;
    overflow-y: auto;
    padding: 10px 16px;
    min-height: 0;
  }

  .badge { font-family: var(--mono); font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
  .badge-green  { background: #1a3a20; color: var(--green); }
  .badge-red    { background: #3a1a1a; color: var(--red); }
  .badge-yellow { background: #3a2e10; color: var(--yellow); }
  .badge-blue   { background: #1a2a3a; color: var(--accent); }

  /* Compact dropzone */
  .dropzone {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: border-color .2s, background .2s;
  }
  .dropzone:hover, .dropzone.drag { border-color: var(--accent); background: #0d1f33; }
  .dropzone .icon { font-size: 24px; flex-shrink: 0; }
  .dropzone p { color: var(--muted); font-size: 13px; line-height: 1.5; }
  .dropzone strong { color: var(--text); }
  #fileInput { display: none; }

  /* Chart card */
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 24px;
    display: none;
  }
  .chart-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .chart-card-header h2 {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .08em;
  }

  /* Dataset toggle buttons */
  .ds-toggles {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .ds-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--muted);
    font-size: 12px;
    font-family: var(--sans);
    cursor: pointer;
    transition: all .15s;
    user-select: none;
  }
  .ds-btn .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    opacity: 0.4;
    transition: opacity .15s;
  }
  .ds-btn.active {
    color: var(--text);
    border-color: #30363d;
    background: var(--surface);
  }
  .ds-btn.active .dot { opacity: 1; }

  .chart-wrap { position: relative; height: 320px; }

  /* Zoom controls */
  .chart-zoom-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .chart-zoom-bar .zoom-hint {
    font-size: 11px;
    color: var(--muted);
    margin-right: auto;
  }
  .zoom-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-family: var(--sans);
    cursor: pointer;
    transition: all .15s;
  }
  .zoom-btn:hover { border-color: var(--accent); color: var(--text); }

  /* Stats */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 8px;
    overflow: visible;
  }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px; position: relative; overflow: visible; }
  .stat-card:hover { z-index: 20; }
  .stat-card .label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; display: flex; align-items: center; gap: 2px; }
  .stat-card .value { font-family: var(--mono); font-size: 22px; font-weight: 600; line-height: 1; }
  .stat-card .value.red    { color: var(--red); }
  .stat-card .value.green  { color: var(--green); }
  .stat-card .value.yellow { color: var(--yellow); }

  /* Quality diagnosis */
  .quality-grid { display: grid; grid-template-columns: auto 1fr auto auto; gap: 4px 10px; align-items: center; font-size: 13px; margin: 8px 0; }
  .quality-layer-name { color: var(--muted); white-space: nowrap; }
  .quality-bar-wrap { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; min-width: 100px; }
  .quality-bar-fill { height: 100%; border-radius: 4px; transition: width .3s; }
  .quality-pct { font-family: var(--mono); font-size: 12px; min-width: 36px; text-align: right; }
  .quality-detail { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .quality-overall { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; padding: 8px 12px; background: rgba(255,255,255,.02); border-radius: 8px; }
  .quality-overall .q-icon { font-size: 18px; }
  .quality-overall .q-label { font-size: 14px; font-weight: 600; }
  .quality-overall .q-bn { font-size: 12px; color: var(--muted); margin-left: auto; }
  .quality-message { font-size: 12px; color: var(--yellow); margin-top: 8px; padding: 6px 10px; background: #3a2e10; border: 1px solid #5a4a20; border-radius: 6px; }
  .quality-badge { font-family: var(--mono); font-size: 10px; padding: 1px 7px; border-radius: 10px; font-weight: 600; margin-left: 6px; }

  /* Filter bar */
  .filter-bar { display: flex; gap: 6px; flex-wrap: wrap; padding: 6px 16px; flex-shrink: 0; }
  .filter-btn {
    background: var(--surface); border: 1px solid var(--border); color: var(--muted);
    padding: 4px 10px; border-radius: 20px; font-size: 12px; cursor: pointer;
    transition: all .15s; font-family: var(--sans);
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* Timeline */
  .timeline { display: flex; flex-direction: column; gap: 10px; }

  .entry { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; transition: border-color .15s; }
  .entry:hover { border-color: #30363d; }
  .entry.disconnection { border-left: 3px solid var(--red); }
  .entry.reconnection  { border-left: 3px solid var(--green); }
  .entry.speedtest     { border-left: 3px solid #e3a008; }
  .entry.status        { border-left: 3px solid var(--border); }
  .entry.roaming       { border-left: 3px solid var(--yellow); }
  .entry.bss_scan      { border-left: 3px solid #58a6ff; }
  .bss-ssid-row td     { font-weight: 500; background: rgba(255,255,255,0.04); padding-top: 8px; }
  .bss-mine            { color: var(--yellow); font-weight: 500; }

  .entry-header { display: flex; align-items: center; gap: 10px; padding: 11px 16px; cursor: pointer; user-select: none; }
  .entry-header:hover { background: rgba(255,255,255,.02); }
  .entry-time { font-family: var(--mono); font-size: 12px; color: var(--muted); white-space: nowrap; }
  .entry-title { flex: 1; font-size: 14px; font-weight: 500; }
  .chevron { color: var(--muted); font-size: 12px; transition: transform .2s; }
  .entry.open .chevron { transform: rotate(90deg); }
  .entry-body { display: none; border-top: 1px solid var(--border); padding: 16px; }
  .entry.open .entry-body { display: block; }

  .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin: 16px 0 8px; }
  .section-title:first-child { margin-top: 0; }

  .cause-list { list-style: none; }
  .cause-list li { padding: 6px 10px; background: #3a1a1a; border: 1px solid #5a2020; border-radius: 6px; font-size: 13px; margin-bottom: 6px; color: #ffaaaa; }
  .rec-list { list-style: none; }
  .rec-list li { padding: 6px 10px; background: #1a2a1a; border: 1px solid #205020; border-radius: 6px; font-size: 13px; margin-bottom: 6px; color: #aaffaa; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 6px 10px; font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); border-bottom: 1px solid var(--border); }
  td { padding: 7px 10px; border-bottom: 1px solid #1a1f26; font-family: var(--mono); }
  tr:last-child td { border-bottom: none; }

  .signal-bar-wrap { display: flex; align-items: center; gap: 8px; }
  .signal-bar { height: 6px; border-radius: 3px; background: var(--border); flex: 1; max-width: 100px; overflow: hidden; }
  .signal-fill { height: 100%; border-radius: 3px; }

  .wifi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 24px; font-size: 13px; }
  .wifi-row { display: flex; gap: 8px; }
  .wifi-key { color: var(--muted); min-width: 90px; }
  .wifi-val { font-family: var(--mono); }

  .empty-state { text-align: center; padding: 32px; color: var(--muted); font-size: 13px; }

  /* Dock trigger button (in dashboard) */
  .dock-trigger {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-size: 13px;
    font-family: var(--sans);
    cursor: pointer;
    transition: all .15s;
    width: 100%;
  }
  .dock-trigger:hover { border-color: var(--accent); color: var(--text); }
  .dock-trigger .count-badge {
    font-family: var(--mono);
    font-size: 11px;
    padding: 1px 8px;
    border-radius: 10px;
    background: #1a2a3a;
    color: var(--accent);
  }

  /* ── Chart↔Log cross-link highlight ── */
  .entry.highlight {
    border-color: var(--accent) !important;
    box-shadow: 0 0 0 1px var(--accent), 0 0 12px rgba(88,166,255,.25);
    transition: box-shadow .3s, border-color .3s;
  }
  .entry.highlight .entry-header {
    background: rgba(88,166,255,.06);
  }

  /* Glossary hint tooltips */
  .hint { display: inline-flex; align-items: center; justify-content: center; width: 14px; height: 14px; border-radius: 50%; background: rgba(88,166,255,.12); color: var(--accent); font-size: 9px; font-weight: 700; cursor: help; position: relative; vertical-align: middle; margin-left: 3px; flex-shrink: 0; line-height: 1; user-select: none; }
  .hint:hover { background: rgba(88,166,255,.25); }
  .hint::after { content: attr(data-tip); position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%); background: #1c2128; color: var(--text); font-size: 12px; font-weight: 400; font-family: var(--sans); padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); white-space: normal; width: max-content; max-width: 260px; line-height: 1.55; pointer-events: none; opacity: 0; transition: opacity .15s; z-index: 100; box-shadow: 0 4px 16px rgba(0,0,0,.4); text-align: left; }
  .hint:hover::after { opacity: 1; }
  .hint-right::after { left: auto; right: 0; transform: none; }
  .hint-left::after { left: 0; transform: none; }
  /* SVG hint icon */
  .nm-hint { cursor: help; }
  .nm-hint-tip { pointer-events: none; opacity: 0; transition: opacity .15s; }
  .nm-hint:hover + .nm-hint-tip, .nm-hint:hover ~ .nm-hint-tip { opacity: 1; }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ── Network Diagnosis Visualization ── */
  .netdiag-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    display: none;
    overflow: hidden;
  }
  .netdiag-section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .08em;
    margin-bottom: 14px;
  }
  .netdiag-section-title:not(:first-of-type) { margin-top: 28px; }

  /* Network Path Map (SVG) */
  .net-map { position: relative; width: 100%; padding: 10px 0 6px; }
  .net-map svg { display: block; width: 100%; height: auto; overflow: visible; }
  .net-map svg text { font-family: var(--sans); }
  .net-map svg .nm-mono { font-family: var(--mono); letter-spacing: .04em; }
  @keyframes flowDash  { to { stroke-dashoffset: -24; } }
  @keyframes flowDash2 { to { stroke-dashoffset: -31; } }
  @keyframes flowDash3 { to { stroke-dashoffset: -41; } }
  @keyframes pulse-glow-node {
    0%,100% { filter: drop-shadow(0 0 4px rgba(248,81,73,.3)); }
    50%     { filter: drop-shadow(0 0 14px rgba(248,81,73,.7)); }
  }
  .nm-flow  { animation: flowDash  2.2s linear infinite; }
  .nm-flow2 { animation: flowDash2 3.4s linear infinite; }
  .nm-flow3 { animation: flowDash3 4.8s linear infinite; }
  .nm-bn-node { animation: pulse-glow-node 2s ease-in-out infinite; }

  /* Health Timeline */
  .ht-wrap { position: relative; height: 160px; border-radius: 8px; overflow: hidden; }
  .ht-wrap canvas { display: block; width: 100% !important; height: 100% !important; }
  .ht-controls { display: flex; align-items: center; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .ht-controls .zoom-hint { font-size: 11px; color: var(--muted); margin-right: auto; }
  .ht-toggles { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .ht-legend { display: flex; gap: 14px; margin-top: 8px; flex-wrap: wrap; justify-content: flex-end; }
  .ht-legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); cursor: default; }
  .ht-swatch { width: 14px; height: 3px; border-radius: 2px; flex-shrink: 0; }
  .ht-legend-zones { margin-top: 2px; opacity: .7; }
  .ht-legend-zones .ht-swatch { width: 10px; height: 10px; border-radius: 2px; }
  .ht-bn-dot { width: 8px; height: 8px; border-radius: 50%; background: #f85149; flex-shrink: 0; }

  /* Bottleneck frequency */
  .bn-chart { margin-top: 8px; }
  .bn-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; min-width: 0; }
  .bn-name { font-size: 12px; min-width: 100px; width: 100px; flex-shrink: 0; white-space: nowrap; }
  .bn-bar-wrap { flex: 0 1 300px; height: 14px; background: var(--border); border-radius: 7px; overflow: hidden; }
  .bn-bar-fill { height: 100%; border-radius: 7px; transition: width .5s; }
  .bn-count { font-family: var(--mono); font-size: 12px; color: var(--muted); min-width: 80px; flex-shrink: 0; }

  /* ── AP Mobility / Tethering Analysis ── */
  .mob-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    display: none;
    overflow: hidden;
  }
  .mob-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .mob-header h2 {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  .mob-type-badge {
    font-size: 12px;
    padding: 3px 12px;
    border-radius: 20px;
    font-weight: 600;
    font-family: var(--mono);
  }
  .mob-type-tether { background: #2d1f3a; color: #bc8cff; border: 1px solid #4a2d6a; }
  .mob-type-fixed  { background: #1a2a3a; color: var(--accent); border: 1px solid #2a3a5a; }

  .mob-summary {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 10px;
    margin-bottom: 18px;
  }
  .mob-metric {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
  }
  .mob-metric .mm-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; }
  .mob-metric .mm-val { font-family: var(--mono); font-size: 20px; font-weight: 600; line-height: 1.2; }
  .mob-metric .mm-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* Distance gauge */
  .dist-gauge {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 0;
  }
  .dist-gauge-track {
    flex: 1;
    height: 10px;
    background: var(--border);
    border-radius: 5px;
    position: relative;
    overflow: visible;
  }
  .dist-gauge-zones {
    position: absolute;
    inset: 0;
    border-radius: 5px;
    overflow: hidden;
    display: flex;
  }
  .dist-zone { height: 100%; }
  .dist-gauge-marker {
    position: absolute;
    top: 50%;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--text);
    border: 2px solid var(--bg);
    transform: translate(-50%, -50%);
    z-index: 2;
    transition: left .5s;
  }
  .dist-gauge-labels {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--muted);
    font-family: var(--mono);
    margin-top: 4px;
  }
  .dist-label { text-align: center; }
  .dist-label-val { font-size: 12px; font-weight: 600; }

  /* Rapid drop events */
  .mob-drops { margin-top: 6px; }
  .mob-drop-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 10px;
    background: #3a1a1a;
    border: 1px solid #5a2020;
    border-radius: 6px;
    font-size: 12px;
    margin-bottom: 4px;
    color: #ffaaaa;
  }
  .mob-drop-item .drop-time { font-family: var(--mono); color: var(--muted); min-width: 48px; }
  .mob-drop-item .drop-arrow { font-size: 14px; }

  /* Signal sparkline */
  .mob-spark-wrap {
    position: relative;
    height: 80px;
    margin-top: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .mob-spark-wrap canvas { display: block; width: 100%; height: 100%; }
